services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_HOST_PORT:-5433}:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    command: flask --app app.py run --host=0.0.0.0 --port=5000 --debug
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/postgres}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      PORT: ${PORT:-5000}
      IS_DEBUG: ${IS_DEBUG:-True}
    ports:
      - "${WEB_HOST_PORT:-5001}:5000"
    volumes:
      - .:/workspace:cached
      - media-volume:/app/media
    env_file:
      - path: .env
        required: false
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
    internal: false

volumes:
  postgres_data:
  media-volume: