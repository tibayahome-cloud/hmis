services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port ${BACKEND_PORT:-8000} --workers 4 
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      IS_DEBUG: ${IS_DEBUG:-True}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - .:/workspace:cached
      - media-volume:/app/media

volumes:
  media-volume:
